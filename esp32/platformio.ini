; AC200L auto-restart controller — ESP32 firmware
;
; Default target is the classic ESP32 DevKit (board = esp32dev), the most common and
; best-documented board. To use an ESP32-C3 or S3 instead, comment the esp32dev env and
; uncomment the matching one below (all three have Bluetooth LE). Do NOT use ESP32-S2 —
; it has no Bluetooth.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = h2zero/NimBLE-Arduino@^1.4.0

; [env:esp32-c3]
; platform = espressif32
; board = esp32-c3-devkitm-1
; framework = arduino
; monitor_speed = 115200
; lib_deps = h2zero/NimBLE-Arduino@^1.4.0

